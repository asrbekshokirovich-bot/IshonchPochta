  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const barcodeParam = urlParams.get('barcode');
      if (barcodeParam) {
        document.getElementById('tracking-id').value = barcodeParam.toUpperCase();
        doTrack(barcodeParam);
      }
    });

    /* ────────────────────────────────────────────────
       1. Supabase tracking lookup
       ──────────────────────────────────────────────── */
    const SUPABASE_URL = 'https://dhqzairyxzoppskzpzxr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_pjDSopKeZlYFqToEBDrvLw_Q7QO_IOd';
    const UZPOST_URL   = 'https://prodapi.pochta.uz/api/v1/public/order';

    async function trackShipment(trackingCode) {
      const code = trackingCode.trim().toUpperCase();

      // 1. Try Supabase first (Ishonch own shipments)
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/shipments?tracking_code=eq.${encodeURIComponent(code)}&select=*`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();
        if (Array.isArray(data) && data.length > 0) {
          const row = data[0];
          const mapped = mapStatus(row.status);
          return {
            id: row.tracking_code,
            source: 'ishonch',
            status: mapped,
            currentStep: statusToStep(mapped),
            etaText: statusToEta(mapped),
            originCity: row.sender_city || '—',
            destCity: row.receiver_city || '—',
            lastEvent: (row.package_type || 'Standart') + ' · ' + row.tracking_code,
            lastEventAt: row.updated_at,
            weightKg: row.weight_kg || 0,
            service: 'standard',
            receiverName: row.receiver_name || '',
            senderName: row.sender_name || '',
          };
        }
      } catch (e) {
        console.warn('Supabase lookup failed:', e);
      }

      // 2. Try UzPost public API
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        const res = await fetch(
          `${UZPOST_URL}/${encodeURIComponent(code)}`,
          { headers: { 'Accept': 'application/json' }, signal: controller.signal }
        );
        clearTimeout(timeout);

        if (res.status === 404) return { id: code, status: 'not_found' };
        if (!res.ok) throw new Error(`UzPost error ${res.status}`);

        const raw = await res.json();
        const d = (raw && raw.data) ? raw.data : raw;
        const locations = Array.isArray(d.locations) ? d.locations : [];
        const pickup = locations.find(l => l.pickup === true) || {};
        const dest   = locations.find(l => l.pickup === false) || {};
        const st     = d.status || 'accepted';
        const mapped = mapStatus(st);

        return {
          id: d.order_number || code,
          source: 'uzpost',
          status: mapped,
          currentStep: statusToStep(mapped),
          etaText: statusToEta(mapped),
          originCity: pickup.address_city || '—',
          destCity: dest.address_city || '—',
          lastEvent: ((d.package && d.package.name) || 'Jo\'natma') + ' · ' + (d.order_number || code),
          lastEventAt: new Date().toISOString(),
          weightKg: 0,
          service: 'standard',
        };
      } catch (e) {
        if (e.name === 'AbortError') {
          throw new Error("So'rov vaqti tugadi. Qayta urinib ko'ring.");
        }
        if (e instanceof TypeError) {
          // CORS / network failure — don't throw, fall through to not_found.
          console.warn('UzPost CORS/network error:', e);
        } else {
          console.warn('UzPost lookup failed:', e);
        }
      }

      return { id: code, status: 'not_found' };
    }

    function mapStatus(s) {
      if (!s) return 'accepted';
      s = s.toLowerCase();
      if (['accepted','created','unassigned'].includes(s)) return 'accepted';
      if (['in_transit','processing','sent','picked_up'].includes(s)) return 'in_transit';
      if (['out_for_delivery','issued_to_courier'].includes(s)) return 'out_for_delivery';
      if (['delivered','completed','issued_to_recipient'].includes(s)) return 'delivered';
      return 'accepted';
    }
    function statusToStep(s) {
      return { accepted:0, created:0, in_transit:1, processing:1, out_for_delivery:2, delivered:3 }[s] ?? 0;
    }
    function statusToEta(s) {
      return { accepted:'Qabul qilindi', in_transit:"Yo'lda", out_for_delivery:'Yetkazib berishda', delivered:'Yetkazildi' }[s] ?? 'Qabul qilindi';
    }

    /* ────────────────────────────────────────────────
       2. View — renders result into #result
       ──────────────────────────────────────────────── */
    const STATUS_META = {
      accepted: {
        label: 'Qabul qilindi',
        sub: 'Yuk bizning omborga keldi.',
        tone: 'blue',
        emoji: '\u{1F4E6}',
      },
      in_transit: {
        label: 'Yo\u02bclda',
        sub: 'Yukingiz manzilingiz tomon harakatda.',
        tone: 'amber',
        emoji: '\u{1F69B}',
      },
      out_for_delivery: {
        label: 'Yetkazib berishda',
        sub: 'Kuryer manzilingizga jo\u02bcnadi.',
        tone: 'amber',
        emoji: '\u{1F6F5}',
      },
      delivered: {
        label: 'Yetkazildi',
        sub: 'Yukingiz qabul qiluvchiga topshirildi.',
        tone: 'green',
        emoji: '\u2705',
      },
      not_found: {
        label: 'Topilmadi',
        sub: 'Bu raqam bo\u02bcyicha yuk topilmadi. Raqamni tekshirib ko\u02bcring.',
        tone: 'rose',
        emoji: '\u{1F50E}',
      },
    };

    const TONES = {
      amber:  { bg:'bg-amber-50',  ring:'ring-amber-100',  text:'text-amber-700',  dot:'bg-amber-400',  bar:'bg-amber-400' },
      green:  { bg:'bg-emerald-50',ring:'ring-emerald-100',text:'text-emerald-700',dot:'bg-emerald-500',bar:'bg-emerald-500' },
      blue:   { bg:'bg-brand-50',  ring:'ring-brand-50',   text:'text-brand-500',  dot:'bg-brand-500',  bar:'bg-brand-500' },
      rose:   { bg:'bg-rose-50',   ring:'ring-rose-100',   text:'text-rose-700',   dot:'bg-rose-400',   bar:'bg-rose-400' },
    };

    const STEPS = [
      { key:'accepted',         label:'Qabul qilindi' },
      { key:'in_transit',       label:'Yo\u02bclda' },
      { key:'out_for_delivery', label:'Yetkazib berishda' },
      { key:'delivered',        label:'Yetkazildi' },
    ];

    const $ = (sel) => document.querySelector(sel);
    const result = $('#result');

    // Escape any user/API-controlled value before HTML insertion (XSS).
    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function renderResult(data) {
      const meta = STATUS_META[data.status];
      const tone = TONES[meta.tone];

      if (data.status === 'not_found') {
        result.innerHTML = `
          <div class="bg-white rounded-3xl shadow-card border border-ink-100 p-8 sm:p-10 text-center animate-fade-up">
            <div class="mx-auto w-16 h-16 rounded-2xl ${tone.bg} grid place-items-center text-3xl">${meta.emoji}</div>
            <h2 class="mt-5 text-2xl font-extrabold tracking-tight text-navy-800">${meta.label}</h2>
            <p class="mt-2 text-ink-500 text-[15px] max-w-sm mx-auto">${meta.sub}</p>
            <div class="mt-6 inline-flex items-center gap-2 text-[13px] text-ink-400 bg-ink-100 px-3 py-1.5 rounded-full font-mono">${esc(data.id || '—')}</div>
          </div>
        `;
        result.classList.remove('hidden');
        return;
      }

      const stepIdx = clamp(data.currentStep ?? 0, 0, 3);
      const progressPct = (stepIdx / (STEPS.length - 1)) * 100;
      const isDelivered = data.status === 'delivered';

      result.innerHTML = `
        <article class="bg-white rounded-3xl shadow-card border border-ink-100 overflow-hidden animate-fade-up">
          <!-- Status header -->
          <div class="p-7 sm:p-9 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl ${tone.bg} ring-8 ${tone.ring} mb-5 relative">
              ${isDelivered
                ? `<svg class="w-10 h-10 ${tone.text}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5 9-11"/></svg>`
                : `<span class="relative inline-flex">
                     <span class="w-4 h-4 rounded-full ${tone.dot}"></span>
                     <span class="absolute inset-0 rounded-full ${tone.dot} opacity-40 animate-ping"></span>
                   </span>`
              }
            </div>
            <div class="text-[12px] uppercase tracking-[.16em] font-semibold ${tone.text}">
              ${isDelivered ? '\u{1F7E2}' : '\u{1F7E1}'} ${meta.label.toUpperCase()}
            </div>
            <h2 class="mt-2 text-3xl sm:text-[34px] font-extrabold tracking-[-0.03em] text-navy-800">${esc(data.lastEvent)}</h2>
            <p class="mt-2 text-ink-500 text-[15.5px]">${meta.sub}</p>
          </div>

          <!-- Route line -->
          <div class="px-7 sm:px-9">
            <div class="flex items-center justify-between text-[12px] font-semibold tracking-wider text-ink-500 uppercase">
              <span>${esc(data.originCity)}</span>
              <span>${esc(data.destCity)}</span>
            </div>

            <!-- Progress bar -->
            <div class="mt-3 relative h-1.5 bg-ink-100 rounded-full overflow-hidden">
              <div class="absolute left-0 top-0 h-full ${tone.bar} rounded-full transition-[width] duration-700 ease-out"
                   style="width:${progressPct}%"></div>
              ${!isDelivered ? `<div class="absolute inset-0 shimmer animate-sweep" style="left:${progressPct - 10}%; width: 20%;"></div>` : ``}
            </div>

            <!-- Step dots -->
            <ol class="mt-5 grid grid-cols-4 gap-2">
              ${STEPS.map((s, i) => {
                const done = i < stepIdx;
                const current = i === stepIdx;
                return `
                  <li class="flex flex-col items-center text-center">
                    <div class="w-3 h-3 rounded-full ${done ? tone.bar : current ? tone.bar : 'bg-ink-200'} ${current && !isDelivered ? 'ring-4 ring-amber-100' : ''} ${current && isDelivered ? 'ring-4 ring-emerald-100' : ''}"></div>
                    <span class="mt-2 text-[11.5px] font-semibold ${i <= stepIdx ? 'text-ink-900' : 'text-ink-400'} leading-tight">${s.label}</span>
                  </li>
                `;
              }).join('')}
            </ol>
          </div>

          <!-- Meta row -->
          <div class="mt-7 px-7 sm:px-9 py-5 border-t border-ink-100 bg-ink-100/40 flex items-center justify-between gap-4 text-[13px]">
            <div class="flex items-center gap-2 text-ink-500">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              <span><span class="text-ink-900 font-semibold">${esc(data.etaText)}</span></span>
            </div>
            <div class="flex items-center gap-3 text-ink-400">
              <span class="font-mono">${esc(data.id)}</span>
              <span>·</span>
              <span>${esc(data.weightKg)} kg</span>
            </div>
          </div>
        </article>

        <button id="reset-btn" class="mt-4 w-full py-3 text-[13.5px] font-semibold text-ink-500 hover:text-navy-800 transition-colors">
          Boshqa raqamni kuzatish
        </button>
      `;
      result.classList.remove('hidden');
      $('#reset-btn')?.addEventListener('click', resetView);
    }

    function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

    /* ────────────────────────────────────────────────
       3. State machine
       ──────────────────────────────────────────────── */
    function setLoading(on) {
      $('#btn-label').textContent = on ? 'Qidirilmoqda…' : 'Kuzatish';
      $('#btn-arrow').classList.toggle('hidden', on);
      $('#btn-spinner').classList.toggle('hidden', !on);
    }

    function resetView() {
      result.classList.add('hidden');
      result.innerHTML = '';
      $('#tracking-id').value = '';
      $('#tracking-id').focus();
    }

    async function doTrack(id) {
      if (!id) return;
      setLoading(true);
      try {
        const data = await trackShipment(id);
        renderResult(data);
      } catch (err) {
        console.error('trackShipment failed:', err);
        renderResult({ id, status: 'not_found' });
      } finally {
        setLoading(false);
      }
    }

    /* ────────────────────────────────────────────────
       4. Wiring
       ──────────────────────────────────────────────── */
    $('#track-form').addEventListener('submit', (e) => {
      e.preventDefault();
      doTrack($('#tracking-id').value);
    });

    $('#sample-tn').addEventListener('click', () => {
      $('#tracking-id').value = 'TT123456789UZ';
      doTrack('TT123456789UZ');
    });

    // Auto-uppercase the input for nicer feel
    $('#tracking-id').addEventListener('input', (e) => {
      const start = e.target.selectionStart;
      e.target.value = e.target.value.toUpperCase();
      e.target.setSelectionRange(start, start);
    });
  </script>
</body>
</html>
