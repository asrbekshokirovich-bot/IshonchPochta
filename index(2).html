<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'unsafe-inline';
               style-src 'unsafe-inline';
               connect-src https://prodapi.pochta.uz;
               img-src 'self' data:;
               object-src 'none';
               base-uri 'none';
               form-action 'none';">

<meta http-equiv="X-Frame-Options" content="DENY">

<meta http-equiv="X-Content-Type-Options" content="nosniff">

<meta name="referrer" content="no-referrer">
<title>Ishonch Logistics — Parcel Tracking</title>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
                 Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
    background: #F4F7FB;
    color: #1B2440;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input  { font-family: inherit; }
  :root {
    --navy:      #0A2472;
    --navy-2:    #1A5FAA;
    --accent:    #378ADD;
    --sky:       #5BB8F5;
    --bg:        #F4F7FB;
    --card:      #FFFFFF;
    --border:    #E1E7F0;
    --muted:     #6A748A;
    --text:      #1B2440;
    --shadow:    0 4px 18px rgba(10,36,114,0.08);
    --shadow-lg: 0 14px 40px rgba(10,36,114,0.14);
    --radius:    14px;
    --radius-sm: 10px;
  }
  header.site-header {
    position: sticky; top: 0; z-index: 50;
    background: #fff;
    border-bottom: 1px solid rgba(10,36,114,0.10);
    backdrop-filter: saturate(140%) blur(6px);
  }
  .header-inner {
    max-width: 1120px; margin: 0 auto;
    padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; user-select: none; }
  .brand .logo-wrap { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
  .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-text .name { font-weight: 800; font-size: 17px; letter-spacing: 0.5px; color: var(--navy); }
  .brand-text .tagline { font-style: italic; font-size: 11.5px; color: var(--accent); margin-top: 2px; }
  .hero {
    background: linear-gradient(135deg, #0A2472 0%, #1A5FAA 100%);
    color: #fff; padding: 64px 22px 84px;
    position: relative; overflow: hidden;
  }
  .hero::before, .hero::after {
    content: ""; position: absolute; border-radius: 50%;
    pointer-events: none; filter: blur(1px); opacity: .14;
  }
  .hero::before { width: 320px; height: 320px; background: #5BB8F5; top: -120px; right: -80px; }
  .hero::after  { width: 240px; height: 240px; background: #378ADD; bottom: -120px; left: -60px; opacity: .18; }
  .hero-inner { max-width: 760px; margin: 0 auto; text-align: center; position: relative; z-index: 1; }
  .hero h1 { margin: 0 0 10px; font-size: clamp(28px,4.4vw,42px); font-weight: 800; letter-spacing: -0.4px; }
  .hero p.sub { margin: 0 0 28px; color: #BBD6F2; font-size: clamp(14px,1.6vw,16px); }
  .track-form {
    display: flex; gap: 10px;
    background: #fff; border-radius: 14px; padding: 8px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.18);
    max-width: 560px; margin: 0 auto;
  }
  .track-form input {
    flex: 1; border: none; outline: none;
    padding: 14px 16px; border-radius: 10px; font-size: 15px;
    background: transparent; color: var(--text); letter-spacing: 0.5px;
  }
  .track-form input::placeholder { color: #98A2B3; }
  .btn-track {
    background: var(--navy); color: #fff;
    padding: 12px 20px; border-radius: 10px;
    font-weight: 700; font-size: 15px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background .15s ease, transform .15s ease;
  }
  .btn-track:hover  { background: #07195A; }
  .btn-track:active { transform: scale(.98); }
  .btn-track:disabled { opacity: .6; cursor: not-allowed; }
  .chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 18px; min-height: 28px; }
  .chip {
    background: rgba(255,255,255,0.16); color: #DCE7F6;
    border: 1px solid rgba(255,255,255,0.18);
    padding: 6px 12px; border-radius: 999px;
    font-size: 12.5px; font-family: ui-monospace, monospace; letter-spacing: .4px;
    transition: background .15s, color .15s;
  }
  .chip:hover { background: #DCEAFA; color: var(--navy); }
  .chips-label { width: 100%; text-align: center; color: #BBD6F2; font-size: 12px; margin-bottom: 4px; }
  main {
    flex: 1; width: 100%; max-width: 920px;
    margin: -48px auto 0; padding: 0 22px 60px;
    position: relative; z-index: 2;
  }
  .empty-state {
    background: #fff; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 60px 24px;
    text-align: center; color: var(--muted);
  }
  .empty-illustration { width: 140px; height: 140px; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; }
  .empty-state h3 { margin: 0 0 6px; font-size: 18px; color: var(--navy); }
  .empty-state p  { margin: 0; font-size: 14px; }
  .loading { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 60px 24px; text-align: center; }
  .spinner {
    width: 46px; height: 46px; border-radius: 50%;
    border: 4px solid #E1E7F0; border-top-color: var(--navy);
    margin: 0 auto 14px; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); margin: 0; font-size: 14px; }
  .result-card {
    background: #fff; border-left: 5px solid var(--navy);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 26px 28px; animation: fadeUp .45s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-head { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .tracking-num { font-family: ui-monospace, monospace; font-size: 17px; font-weight: 700; color: var(--navy); letter-spacing: 1px; }
  .tracking-label { display: block; font-family: -apple-system, sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; border: 1px solid transparent; white-space: nowrap; }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .badge.delivered { background: #E6F4EA; color: #1B7F3A; border-color: #A8D5B5; }
  .badge.transit   { background: #E6F1FB; color: #0A2472; border-color: #378ADD; }
  .badge.pending   { background: #FFF8E1; color: #8A6000; border-color: #FFD54F; }
  .badge.failed    { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .badge.notfound  { background: #F1EFE8; color: #5F5E5A; border-color: #B4B2A9; }
  .route { margin-top: 22px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 14px; }
  .route .city { background: #F4F7FB; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
  .route .city .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .route .city .label svg { width: 13px; height: 13px; }
  .route .city .name { font-weight: 700; font-size: 16px; color: var(--navy); }
  .route .arrow { color: var(--accent); display: flex; justify-content: center; }
  .meta-row { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 16px 28px; color: var(--muted); font-size: 13.5px; }
  .meta-row span strong { color: var(--text); font-weight: 600; margin-left: 4px; }
  .divider { height: 1px; background: var(--border); margin: 24px 0 20px; }
  .history-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 700; margin: 0 0 18px; }
  .timeline { position: relative; padding-left: 26px; }
  .timeline::before { content: ""; position: absolute; left: 8px; top: 6px; bottom: 6px; width: 2px; background: linear-gradient(to bottom, var(--accent), var(--border)); border-radius: 2px; }
  .step { position: relative; padding: 0 0 22px; }
  .step:last-child { padding-bottom: 0; }
  .step .step-dot { position: absolute; left: -26px; top: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 3px solid #C7D2E3; box-sizing: border-box; }
  .step.latest .step-dot { border-color: var(--navy); background: var(--navy); box-shadow: 0 0 0 4px rgba(10,36,114,0.12); }
  .step .step-label { font-weight: 600; color: var(--muted); font-size: 14px; }
  .step.latest .step-label { color: var(--navy); font-weight: 700; }
  .step .step-meta { font-size: 12.5px; color: #94A0B7; margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px 12px; }
  .step.latest .step-meta { color: var(--accent); }
  footer.site-footer { background: #fff; border-top: 1px solid var(--border); padding: 26px 22px; margin-top: auto; }
  .footer-inner { max-width: 1120px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
  .footer-brand { display: flex; align-items: center; gap: 10px; }
  .footer-brand .logo-wrap { width: 28px; height: 28px; }
  .footer-brand .text { display: flex; flex-direction: column; line-height: 1.1; }
  .footer-brand .text .name { font-weight: 700; font-size: 13px; color: var(--navy); letter-spacing: 0.4px; }
  .footer-brand .text .tagline { font-style: italic; color: var(--accent); font-size: 11px; margin-top: 2px; }
  .footer-meta { color: var(--muted); font-size: 12.5px; display: flex; gap: 18px; flex-wrap: wrap; }
  .footer-meta .powered { color: var(--accent); font-weight: 600; }
  .toast-container { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 200; pointer-events: none; max-width: 360px; }
  .toast { background: #fff; border-radius: 12px; padding: 14px 16px 14px 14px; box-shadow: var(--shadow-lg); border-left: 4px solid var(--navy); display: flex; align-items: flex-start; gap: 10px; pointer-events: auto; animation: slideIn .3s cubic-bezier(.2,.9,.4,1.2); min-width: 240px; }
  .toast.leaving { animation: slideOut .3s ease forwards; }
  @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { to { transform: translateX(120%); opacity: 0; } }
  .toast.error   { border-left-color: #A32D2D; }
  .toast.success { border-left-color: #1B7F3A; }
  .toast.info    { border-left-color: var(--accent); }
  .toast .toast-icon { width: 22px; height: 22px; flex-shrink: 0; margin-top: 1px; }
  .toast.error   .toast-icon { color: #A32D2D; }
  .toast.success .toast-icon { color: #1B7F3A; }
  .toast.info    .toast-icon { color: var(--accent); }
  .toast .toast-text { flex: 1; font-size: 13.5px; color: var(--text); line-height: 1.4; }
  .toast .toast-text strong { display: block; font-size: 13px; color: var(--navy); margin-bottom: 2px; }
  .toast .toast-close { color: var(--muted); padding: 2px; align-self: flex-start; font-size: 16px; line-height: 1; }
  .toast .toast-close:hover { color: var(--navy); }
  @media (max-width: 600px) {
    .header-inner { padding: 12px 16px; }
    .brand-text .name { font-size: 14.5px; }
    .brand-text .tagline { font-size: 10.5px; }
    .hero { padding: 48px 18px 70px; }
    .track-form { flex-direction: column; padding: 12px; }
    .track-form input { padding: 12px 10px; }
    .btn-track { justify-content: center; padding: 12px 16px; }
    main { padding: 0 16px 50px; }
    .result-card { padding: 22px 18px; }
    .route { grid-template-columns: 1fr; gap: 10px; }
    .route .arrow { transform: rotate(90deg); }
    .footer-inner { justify-content: center; text-align: center; }
    .footer-meta { justify-content: center; }
    .toast-container { left: 14px; right: 14px; max-width: none; }
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="wing-logo" viewBox="0 0 64 64">
      <path d="M4 46 Q24 30 60 36 Q42 42 32 50 Q22 56 4 46 Z" fill="#5BB8F5"/>
      <path d="M6 34 Q26 18 60 24 Q44 30 34 38 Q24 44 6 34 Z" fill="#1A5FAA"/>

    <symbol id="arrow-right" viewBox="0 0 24 24">

    <symbol id="close" viewBox="0 0 24 24">

    </symbol>
    <symbol id="alert" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>

      <path d="M20 70 H120" stroke="#378ADD" stroke-width="2"/>
      <rect x="60" y="48" width="20" height="68" fill="#5BB8F5" opacity="0.55"/>
      <path d="M70 30 L40 48 H100 Z" fill="#0A2472"/>
      <circle cx="105" cy="38" r="14" fill="#fff" stroke="#0A2472" stroke-width="2.5"/>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <div class="logo-wrap">
        <svg width="44" height="44"><use href="#wing-logo"/></svg>
      </div>
      <div class="brand-text">
        <span class="name">ISHONCH LOGISTICS</span>
        <span class="tagline">Ishonch har bir yetkazishda</span>
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>Track Your Shipment</h1>
    <p class="sub">Enter your UzPost tracking number below</p>
    <form class="track-form" id="trackForm" autocomplete="off">
      <input
        id="trackInput" type="text" name="tracking"
        placeholder="e.g. TT123456789UZ"
        spellcheck="false"
        autocapitalize="characters"
        maxlength="40"
        aria-label="Tracking number"
      />
      <button class="btn-track" type="submit" id="trackBtn">
        <svg width="18" height="18" viewBox="0 0 64 64" style="transform:translateY(-1px)">
          <use href="#wing-logo"/>
        </svg>
        Track
      </button>
    </form>
    <div class="chips" id="chipsBox" aria-label="Recent tracking numbers"></div>
  </div>
</section>

<main>
  <div id="resultArea">
    <div class="empty-state">
      <div class="empty-illustration">
        <svg width="140" height="140"><use href="#empty-illu"/></svg>
      </div>
      <h3>Ready when you are</h3>
      <p>Enter a tracking number to get started.</p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="logo-wrap">
        <svg width="28" height="28"><use href="#wing-logo"/></svg>
      </div>
      <div class="text">
        <span class="name">ISHONCH LOGISTICS</span>
        <span class="tagline">Ishonch har bir yetkazishda</span>
      </div>
    </div>
    <div class="footer-meta">
      <span class="powered">Powered by UzPost API</span>
      <span>© 2025 Ishonch Logistics</span>
    </div>
  </div>
</footer>

<div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

<script>
"use strict";

const API_BASE    = "https://prodapi.pochta.uz/api/v1/public/order/";
const MAX_RECENTS = 5;
const STORAGE_KEY = "ishonch.recents";
const VALID_TRACK = /^[A-Z0-9]{4,40}$/;
let lastRequestTime = 0;
let requestInFlight = false;

const trackForm      = document.getElementById("trackForm");
const trackInput     = document.getElementById("trackInput");
const trackBtn       = document.getElementById("trackBtn");
const chipsBox       = document.getElementById("chipsBox");
const resultArea     = document.getElementById("resultArea");
const toastContainer = document.getElementById("toastContainer");

function storageGet(key) {
  try { return localStorage.getItem(key); } catch { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, val); } catch { /* quota exceeded — silently ignore */ }
}

function getRecents() {
  try {
    const raw = storageGet(STORAGE_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr)
      ? arr.filter(s => typeof s === "string" && VALID_TRACK.test(s)).slice(0, MAX_RECENTS)
      : [];
  } catch { return []; }
}
function pushRecent(num) {
  const n = sanitizeTrackNum(num);
  if (!n) return;
  let list = getRecents().filter(s => s !== n);
  list.unshift(n);
  storageSet(STORAGE_KEY, JSON.stringify(list.slice(0, MAX_RECENTS)));
  renderChips();
}
function renderChips() {
  while (chipsBox.firstChild) chipsBox.removeChild(chipsBox.firstChild);
  const list = getRecents();
  if (!list.length) return;

  const lbl = document.createElement("div");
  lbl.className = "chips-label";
  chipsBox.appendChild(lbl);

  list.forEach(num => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "chip";
    btn.setAttribute("aria-label", "Track " + num + " again");
    btn.addEventListener("click", () => {
      trackInput.value = num;
      handleTrack(num);
    });
    chipsBox.appendChild(btn);
  });
}

function sanitizeTrackNum(raw) {
  if (typeof raw !== "string") return null;
  const cleaned = raw.trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, MAX_INPUT);
  return cleaned.length >= 4 ? cleaned : null;
}

const ALLOWED_TOAST_TYPES = new Set(["error", "success", "info"]);
function showToast(type, title, message, timeout = 4500) {
  if (!ALLOWED_TOAST_TYPES.has(type)) type = "info";
  const iconId = type === "error" ? "alert" : type === "success" ? "check" : "info";

  const t = document.createElement("div");
  t.className = "toast " + type;
  t.setAttribute("role", type === "error" ? "alert" : "status");

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("class", "toast-icon");
  const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
  use.setAttribute("href", "#" + iconId);
  svg.appendChild(use);

  const textDiv = document.createElement("div");
  textDiv.className = "toast-text";
  const strong = document.createElement("strong");
  const msgNode = document.createTextNode(String(message).slice(0, 200));
  textDiv.appendChild(strong);
  textDiv.appendChild(msgNode);

  const closeBtn = document.createElement("button");
  closeBtn.className = "toast-close";
  closeBtn.setAttribute("aria-label", "Dismiss notification");
  closeBtn.setAttribute("type", "button");
  const closeSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  closeSvg.setAttribute("width", "14");
  closeSvg.setAttribute("height", "14");
  const closeUse = document.createElementNS("http://www.w3.org/2000/svg", "use");
  closeUse.setAttribute("href", "#close");
  closeSvg.appendChild(closeUse);
  closeBtn.appendChild(closeSvg);

  t.appendChild(svg);
  t.appendChild(textDiv);
  t.appendChild(closeBtn);
  toastContainer.appendChild(t);

  const rm = () => {
    t.classList.add("leaving");
    setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 300);
  };
  closeBtn.addEventListener("click", rm);
  const timerId = setTimeout(rm, timeout);
  t.addEventListener("mouseenter", () => clearTimeout(timerId));
  t.addEventListener("mouseleave", () => setTimeout(rm, 1500));
}

trackForm.addEventListener("submit", e => {
  e.preventDefault();
  const raw = trackInput.value;
  const num = sanitizeTrackNum(raw);
  if (!num) {
    showToast("error", "Invalid input", "Please enter a valid tracking number (letters and digits only).");
    return;
  }
  handleTrack(num);
});

async function handleTrack(rawNum) {
  const num = sanitizeTrackNum(rawNum);
  if (!num) {
    showToast("error", "Invalid tracking number", "Only letters and digits are allowed.");
    return;
  }

  const now = Date.now();
  if (requestInFlight) {
    showToast("info", "Please wait", "A request is already in progress.");
    return;
  }
  if (now - lastRequestTime < 3000) {
    showToast("info", "Slow down", "Please wait a moment before searching again.");
    return;
  }

  requestInFlight = true;
  lastRequestTime = now;
  showLoading();
  trackBtn.disabled = true;

  try {
    const data = await fetchTracking(num);
    pushRecent(num);
    renderResult(num, data);
  } catch (err) {
    if (err && err.notFound) {
      renderNotFound(num);
      showToast("info", "Not found", "No shipment record found for this number.");
    } else {
      renderEmpty();
      const msg = (err && typeof err.message === "string")
        ? err.message.slice(0, 200)
        : "Unable to reach UzPost API.";
      showToast("error", "Request failed", msg);
    }
  } finally {
    trackBtn.disabled = false;
    requestInFlight = false;
  }
}

async function fetchTracking(num) {
  const url = API_BASE + encodeURIComponent(num);

  if (!url.startsWith("https://prodapi.pochta.uz/")) {
    throw new Error("Invalid API endpoint.");
  }

  let resp;
  try {
    const controller = new AbortController();
    const timeoutId  = setTimeout(() => controller.abort(), 10000); // 10s timeout
    resp = await fetch(url, {
      method: "GET",
      headers: { "Accept": "application/json" },
      signal: controller.signal,
      credentials: "omit",          // cookie yuborma
      referrerPolicy: "no-referrer", // referrer yuborma
    });
    clearTimeout(timeoutId);
  } catch (e) {
    if (e && e.name === "AbortError") {
      throw new Error("Request timed out. Please try again.");
    }
    throw new Error("Network error. Check your connection.");
  }

  if (resp.status === 404) {
    const e = new Error("Not found.");
    e.notFound = true;
    throw e;
  }
  if (resp.status === 429) {
    throw new Error("Too many requests. Please wait before trying again.");
  }
  if (resp.status === 401 || resp.status === 403) {
    throw new Error("Access denied by UzPost API.");
  }
  if (!resp.ok) {
    throw new Error("API error (" + resp.status + "). Please try again.");
  }

  const ct = resp.headers.get("content-type") || "";
  if (!ct.includes("application/json") && !ct.includes("text/json")) {
    // Baribir parse qilib ko'ramiz — ba'zi serverlar header noto'g'ri qo'yadi
  }

  const text = await resp.text();
  if (text.length > 10 * 1024 * 1024) {
    throw new Error("Response too large.");
  }

  let data;
  try { data = JSON.parse(text); }
  catch { throw new Error("Invalid response from server."); }

  if (!data || typeof data !== "object") {
    throw new Error("Unexpected response format.");
  }

  return data;
}

function showLoading() {
  // innerHTML ishlatmaymiz — DOM API bilan
  const wrap = document.createElement("div");
  wrap.className = "loading";
  const spinner = document.createElement("div");
  spinner.className = "spinner";
  spinner.setAttribute("role", "status");
  spinner.setAttribute("aria-label", "Loading");
  const p = document.createElement("p");
  p.textContent = "Contacting UzPost…";
  wrap.appendChild(spinner);
  wrap.appendChild(p);
  resultArea.replaceChildren(wrap);
}

function renderEmpty() {
  const wrap = document.createElement("div");
  wrap.className = "empty-state";
  wrap.innerHTML = [
    '<div class="empty-illustration">',
    '  <svg width="140" height="140"><use href="#empty-illu"/></svg>',
    '</div>',
  ].join("");
  const h3 = document.createElement("h3");
  h3.textContent = "Ready when you are";
  const p = document.createElement("p");
  p.textContent = "Enter a tracking number to get started.";
  wrap.appendChild(h3);
  wrap.appendChild(p);
  resultArea.replaceChildren(wrap);
}

function renderNotFound(num) {
  const card = document.createElement("div");
  card.className = "result-card";

  const head = document.createElement("div");
  head.className = "result-head";

  const info = document.createElement("div");
  const lbl = document.createElement("span");
  lbl.className = "tracking-label";
  lbl.textContent = "Tracking Number";
  const numSpan = document.createElement("span");
  numSpan.className = "tracking-num";
  info.appendChild(lbl);
  info.appendChild(numSpan);

  const badge = makeBadge("notfound", "Not Found");
  head.appendChild(info);
  head.appendChild(badge);

  const divider = document.createElement("div");
  divider.className = "divider";

  const p = document.createElement("p");
  p.style.cssText = "color:var(--muted);margin:0;";
  p.textContent = "No shipment record found. Please double-check the number and try again.";

  card.appendChild(head);
  card.appendChild(divider);
  card.appendChild(p);
  resultArea.replaceChildren(card);
}

function renderResult(num, raw) {
  const d = (raw && raw.data && typeof raw.data === "object") ? raw.data : raw;

  const status  = safeStr(pick(d, ["status","current_status","state"]),  "Unknown");
  const origin  = safeStr(pick(d, ["origin","from","sender_city","sender"]), "—");
  const dest    = safeStr(pick(d, ["destination","to","receiver_city","receiver"]), "—");
  const updated = pick(d, ["updated_at","last_updated","timestamp","date"]) || null;

  let history = pick(d, ["history","events","tracking_history","operations","locations","steps"]) || [];
  if (!Array.isArray(history)) history = [];
  const steps = history.slice(0, 100).map(h => ({
    label: safeStr(pick(h, ["status","operation","event","name","description","activity"]), "Update"),
    date:  pick(h, ["date","timestamp","time","created_at","occurred_at"]) || "",
    place: safeStr(pick(h, ["location","place","city","office","address"]), ""),
  }));

  const card = document.createElement("div");
  card.className = "result-card";

  const head = document.createElement("div");
  head.className = "result-head";
  const info = document.createElement("div");
  const lbl = document.createElement("span");
  lbl.className = "tracking-label";
  lbl.textContent = "Tracking Number";
  const numSpan = document.createElement("span");
  numSpan.className = "tracking-num";
  numSpan.textContent = num;
  info.appendChild(lbl);
  info.appendChild(numSpan);
  head.appendChild(info);
  head.appendChild(makeBadge(badgeClassFor(status), status));
  card.appendChild(head);

  const route = document.createElement("div");
  route.className = "route";
  route.appendChild(makeCity("Origin", origin));
  const arrowDiv = document.createElement("div");
  arrowDiv.className = "arrow";
  arrowDiv.innerHTML = '<svg width="26" height="26"><use href="#arrow-right"/></svg>';
  route.appendChild(arrowDiv);
  route.appendChild(makeCity("Destination", dest));
  card.appendChild(route);

  const meta = document.createElement("div");
  meta.className = "meta-row";
  const updSpan = document.createElement("span");
  updSpan.textContent = "Last updated ";
  const updStrong = document.createElement("strong");
  updStrong.textContent = formatDate(updated);
  updSpan.appendChild(updStrong);
  meta.appendChild(updSpan);
  if (steps.length) {
    const evSpan = document.createElement("span");
    evSpan.textContent = "Total events ";
    const evStrong = document.createElement("strong");
    evStrong.textContent = steps.length;
    evSpan.appendChild(evStrong);
    meta.appendChild(evSpan);
  }
  card.appendChild(meta);

  const div1 = document.createElement("div");
  div1.className = "divider";
  card.appendChild(div1);

  const htitle = document.createElement("h4");
  htitle.className = "history-title";
  htitle.textContent = "Status history";
  card.appendChild(htitle);

  if (steps.length) {
    const tl = document.createElement("div");
    tl.className = "timeline";
    steps.forEach((s, i) => {
      const step = document.createElement("div");
      step.className = "step" + (i === 0 ? " latest" : "");
      const dot = document.createElement("span");
      dot.className = "step-dot";
      const slabel = document.createElement("div");
      slabel.className = "step-label";
      slabel.textContent = s.label;
      const smeta = document.createElement("div");
      smeta.className = "step-meta";
      if (s.date) {
        const dspan = document.createElement("span");
        dspan.textContent = formatDate(s.date);
        smeta.appendChild(dspan);
      }
      if (s.place) {
        const pspan = document.createElement("span");
        pspan.textContent = s.place;
        smeta.appendChild(pspan);
      }
      step.appendChild(dot);
      step.appendChild(slabel);
      step.appendChild(smeta);
      tl.appendChild(step);
    });
    card.appendChild(tl);
  } else {
    const noHist = document.createElement("p");
    noHist.style.cssText = "color:var(--muted);margin:0;";
    noHist.textContent = "No detailed history available for this shipment.";
    card.appendChild(noHist);
  }

  resultArea.replaceChildren(card);
}

function makeBadge(cls, label) {
  const span = document.createElement("span");
  span.className = "badge " + cls;
  const dot = document.createElement("span");
  dot.className = "dot";
  dot.setAttribute("aria-hidden", "true");
  const txt = document.createTextNode(" " + String(label).slice(0, 80));
  span.appendChild(dot);
  span.appendChild(txt);
  return span;
}
function makeCity(titleText, nameText) {
  const div = document.createElement("div");
  div.className = "city";
  const lbl = document.createElement("div");
  lbl.className = "label";
  lbl.innerHTML = '<svg><use href="#pin"/></svg>';
  lbl.appendChild(document.createTextNode(" " + titleText));
  const name = document.createElement("div");
  name.className = "name";
  name.textContent = String(nameText).slice(0, 100);
  div.appendChild(lbl);
  div.appendChild(name);
  return div;
}

function pick(obj, keys) {
  if (!obj || typeof obj !== "object") return undefined;
  for (const k of keys) {
    if (Object.prototype.hasOwnProperty.call(obj, k) &&
        obj[k] !== undefined && obj[k] !== null && obj[k] !== "") {
      return obj[k];
    }
  }
  return undefined;
}
function safeStr(val, fallback) {
  if (val === undefined || val === null) return fallback;
  const s = String(val).trim().slice(0, 300);
  return s || fallback;
}
function badgeClassFor(s) {
  s = String(s || "").toLowerCase();
  if (/(delivered|completed|received|success)/.test(s))                          return "delivered";
  if (/(transit|out.?for.?delivery|shipped|sent|forwarded|in.?progress)/.test(s)) return "transit";
  if (/(pending|accepted|created|registered|processing|awaiting|unassigned)/.test(s)) return "pending";
  if (/(return|fail|cancel|reject|undelivered)/.test(s))                          return "failed";
  if (/(not.?found|unknown)/.test(s))                                             return "notfound";
  return "transit";
}
function formatDate(input) {
  if (!input) return "—";
  const d = new Date(input);
  if (isNaN(d.getTime())) return String(input).slice(0, 50);
  return d.toLocaleString(undefined, {
    year: "numeric", month: "short", day: "2-digit",
    hour: "2-digit", minute: "2-digit"
  });
}

renderChips();
</script>
